const main = document.getElementById('main');
const nav = document.getElementById('nav');

function renderPresentations() {
  data.forEach(p => {
    const pres = document.createElement('div');
    pres.className = 'presentation';
    pres.id = `pres${p.id}`;
    if(p.id === 1) pres.classList.add('active');
    
    let html = `<h2 style="margin-bottom:1.2rem; color:#0f172a;">${p.title}</h2><div class="q-grid">`;
    p.questions.forEach((item, idx) => {
      html += `
      <div class="card">
        <div class="card-header">Вопрос ${idx+1}: ${item.q}</div>
        <div class="card-body">
          <button class="toggle-btn" onclick="toggle('theory-${p.id}-${idx}')">📖 Теория</button>
          <div id="theory-${p.id}-${idx}" class="content-block">
            <div class="section-title">Конспект:</div>
            <p>${item.theory.replace(/\n/g, '<br>')}</p>
          </div>
          <button class="toggle-btn" style="margin-left:0.5rem;" onclick="toggle('task-${p.id}-${idx}')">📝 Задача</button>
          <div id="task-${p.id}-${idx}" class="content-block">
            <div class="section-title">Практическое задание:</div>
            <p style="font-style:italic; background:#f8fafc; padding:0.6rem; border-radius:6px; border:1px dashed #cbd5e1;">${item.task}</p>
          </div>
          <button class="toggle-btn" style="background:#ecfdf5; border-color:#10b981; color:#065f46;" onclick="toggle('sol-${p.id}-${idx}')">✅ Решение</button>
          <div id="sol-${p.id}-${idx}" class="content-block">
            <div class="solution">${item.solution.replace(/\n/g, '<br>')}</div>
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
    pres.innerHTML = html;
    main.appendChild(pres);
  });
}

function toggle(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

nav.addEventListener('click', e => {
  if(e.target.tagName !== 'BUTTON') return;
  const presId = e.target.dataset.pres;
  document.querySelectorAll('.presentation').forEach(p => p.classList.remove('active'));
  document.getElementById(`pres${presId}`).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
});

renderPresentations();
</script>
</body>
</html>
